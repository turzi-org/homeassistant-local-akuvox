# SPDX-FileCopyrightText: 2026 Andrew Grimberg <tykeal@bardicgrove.org>
# SPDX-License-Identifier: Apache-2.0

name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
sort-direction: ascending
categories:
  - title: ":boom: Breaking Change :boom:"
    labels:
      - "breaking-change"
  - title: ":sparkles: New Features :sparkles:"
    labels:
      - "enhancement"
      - "feature"
  - title: ":bug: Bug Fixes :bug:"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: ":zap: Performance :zap:"
    labels:
      - "performance"
  - title: ":wrench: Maintenance :wrench:"
    labels:
      - "chore"
      - "documentation"
      - "maintenance"
      - "repo"
      - "dependencies"
      - "github_actions"
      - "refactor"
      - "style"
      - "build"
      - "revert"
  - title: ":mortar_board: Code Quality :mortar_board:"
    labels:
      - "code-quality"
      - "CI"
      - "test"
autolabeler:
  - label: "breaking-change"
    title:
      - '/^.+(\(.*\))?!:/i'
  - label: "feature"
    title:
      - '/^feat(\(.*\))?:/i'
  - label: "bug"
    title:
      - '/^fix(\(.*\))?:/i'
  - label: "refactor"
    title:
      - '/^refactor(\(.*\))?:/i'
  - label: "code-quality"
    title:
      - '/^test(\(.*\))?:/i'
  - label: "CI"
    title:
      - '/^ci(\(.*\))?:/i'
  - label: "chore"
    title:
      - '/^chore(\(.*\))?:/i'
  - label: "documentation"
    title:
      - '/^docs(\(.*\))?:/i'
  - label: "style"
    title:
      - '/^style(\(.*\))?:/i'
  - label: "performance"
    title:
      - '/^perf(\(.*\))?:/i'
  - label: "revert"
    title:
      - '/^revert(\(.*\))?:/i'
  - label: "build"
    title:
      - '/^build(\(.*\))?:/i'
version-resolver:
  major:
    labels:
      - "breaking-change"
  minor:
    labels:
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "bug"
      - "fix"
      - "bugfix"
      - "performance"
      - "refactor"
      - "style"
      - "build"
      - "chore"
      - "documentation"
      - "CI"
      - "test"
      - "code-quality"
      - "revert"
  default: patch
# yamllint disable rule:line-length
template: |
  $CHANGES

  ## Links
  - [Submit bugs/feature requests](https://github.com/$OWNER/$REPOSITORY/issues)
