list_schedules:
  target:
    entity:
      domain: lock
      integration: local_akuvox
  fields:
    page:
      required: false
      example: 1
      selector:
        number:
          min: 1
          mode: box

list_users:
  target:
    entity:
      domain: lock
      integration: local_akuvox
  fields:
    page:
      required: false
      example: 1
      selector:
        number:
          min: 1
          mode: box

add_schedule:
  target:
    entity:
      domain: lock
      integration: local_akuvox
  fields:
    schedule_type:
      required: true
      example: "0"
      selector:
        select:
          options:
            - value: "0"
              label: "Date Range"
            - value: "1"
              label: "Weekly"
            - value: "2"
              label: "Daily"
    name:
      required: true
      example: "Weekday Access"
      selector:
        text:
          multiline: false
    week:
      required: false
      example:
        - "mon"
        - "tue"
        - "wed"
        - "thu"
        - "fri"
      selector:
        select:
          multiple: true
          options:
            - value: "sun"
              label: "Sunday"
            - value: "mon"
              label: "Monday"
            - value: "tue"
              label: "Tuesday"
            - value: "wed"
              label: "Wednesday"
            - value: "thu"
              label: "Thursday"
            - value: "fri"
              label: "Friday"
            - value: "sat"
              label: "Saturday"
    date_start:
      required: false
      example: "2026-01-01"
      selector:
        date:
    date_end:
      required: false
      example: "2026-12-31"
      selector:
        date:
    time_start:
      required: true
      example: "08:00"
      selector:
        time:
    time_end:
      required: true
      example: "18:00"
      selector:
        time:

