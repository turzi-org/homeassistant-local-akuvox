list_schedules:
  target:
    entity:
      domain: lock
      integration: akuvox
  supports_response: only
  fields:
    page:
      required: false
      example: 1
      selector:
        number:
          min: 1
          mode: box

list_users:
  target:
    entity:
      domain: lock
      integration: akuvox
  supports_response: only
  fields:
    page:
      required: false
      example: 1
      selector:
        number:
          min: 1
          mode: box

add_schedule:
  target:
    entity:
      domain: lock
      integration: akuvox
  fields:
    schedule_type:
      required: true
      example: "0"
      selector:
        select:
          options:
            - "0"
            - "1"
            - "2"
    name:
      required: false
      example: "Weekday Access"
      selector:
        text:
          multiline: false
    week:
      required: false
      example: "12345"
      selector:
        text:
          multiline: false
    daily:
      required: false
      example: "08:00-18:00"
      selector:
        text:
          multiline: false
    date_start:
      required: false
      example: "20260101"
      selector:
        text:
          multiline: false
    date_end:
      required: false
      example: "20261231"
      selector:
        text:
          multiline: false
    time_start:
      required: false
      example: "08:00"
      selector:
        text:
          multiline: false
    time_end:
      required: false
      example: "18:00"
      selector:
        text:
          multiline: false

