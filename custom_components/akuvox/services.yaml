add_user:
  target:
    entity:
      domain: lock
      integration: akuvox
  fields:
    name:
      required: true
      example: "John Doe"
      selector:
        text:
          multiline: false
    user_id:
      required: true
      example: "john.doe"
      selector:
        text:
          multiline: false
    schedule_relay:
      required: true
      example: "1-1;"
      selector:
        text:
          multiline: false
    lift_floor_num:
      required: true
      example: "3"
      selector:
        text:
          multiline: false
    web_relay:
      required: false
      example: ""
      selector:
        text:
          multiline: false
    private_pin:
      required: false
      example: "1234"
      selector:
        text:
          multiline: false
          type: password
    card_code:
      required: false
      example: "ABC123"
      selector:
        text:
          multiline: false

